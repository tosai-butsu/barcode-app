<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>物流バーコード収集</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body{
      margin:0;
      padding:14px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#f3f3f3;
      color:#222;
      transition:background-color .18s;
    }
    body.scan-ok{background:#b9f6ca}
    .wrap{max-width:680px;margin:auto}
    h1{text-align:center;font-size:25px;margin:5px 0 12px}
    .card{
      background:#fff;
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 2px 8px rgba(0,0,0,.1)
    }
    .mode-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px
    }
    .mode-btn{
      margin:0;
      padding:12px 8px;
      font-size:16px;
      background:#6b7280
    }
    .mode-btn.active{background:#1769e0}
    button{
      width:100%;
      margin-top:10px;
      padding:15px;
      border:0;
      border-radius:12px;
      background:#1769e0;
      color:#fff;
      font-size:19px;
      font-weight:700
    }
    button.secondary{background:#555}
    button.warning{background:#b26a00}
    button.danger{background:#c62828}
    button:disabled{opacity:.55}
    #reader{width:100%;overflow:hidden;border-radius:10px}
    #status{
      text-align:center;
      font-size:18px;
      font-weight:700;
      margin:8px 0
    }
    #guide{
      text-align:center;
      font-size:14px;
      line-height:1.5;
      color:#555;
      background:#fff8d8;
      border-radius:10px;
      padding:9px;
      margin-top:8px
    }
    #latest{
      font-size:23px;
      font-weight:700;
      word-break:break-all;
      min-height:34px
    }
    .count{text-align:center;font-size:21px;font-weight:700;margin-top:9px}
    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px
    }
    .controls button{font-size:16px;padding:12px 6px}
    label{display:block;font-weight:700;margin-top:8px}
    input[type=range]{width:100%}
    .note{font-size:13px;color:#666;line-height:1.55}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:7px 3px;border-bottom:1px solid #ddd;text-align:left;word-break:break-all}
    .pending{
      font-size:18px;
      font-weight:700;
      color:#b26a00;
      text-align:center;
      margin-top:8px
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>物流バーコード収集</h1>

  <div class="card">
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="normal">通常・送り状</button>
      <button class="mode-btn" data-mode="wide">横長専用</button>
      <button class="mode-btn" data-mode="upper">2段・上段</button>
      <button class="mode-btn" data-mode="pair">2段・連続</button>
    </div>

    <div id="reader"></div>
    <div id="status">停止中</div>
    <div id="guide">
      画面全体でバーコードを探します。バーコード全体が映る距離から、ゆっくり近づけてください。<br>
      斜めの場合は少し離すと読みやすくなります。
    </div>

    <button id="startBtn">カメラを開始</button>

    <div class="controls">
      <button id="stopBtn" class="secondary">停止</button>
      <button id="torchBtn" class="warning">ライト</button>
    </div>

    <label>ズーム：<span id="zoomValue">1.0</span>倍</label>
    <input id="zoomSlider" type="range" min="1" max="3" step="0.1" value="1">
  </div>

  <div class="card">
    <div>直近の読取</div>
    <div id="latest">未読取</div>
    <div id="pairPending" class="pending"></div>
    <div class="count">登録件数：<span id="count">0</span>件</div>
  </div>

  <div class="card">
    <button id="shareBtn">終了して共有</button>
    <button id="clearBtn" class="danger">全データを削除</button>
    <p class="note">
      対応対象：JAN、EAN、UPC、Code128、Code39、Code93、Codabar、ITF、QR、
      Data Matrix、PDF417など、ライブラリが対応する形式を自動判定します。<br>
      2段・連続モードでは、上段を読んだ後に下段を読み、1件として保存します。
    </p>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>バーコード1</th>
          <th>バーコード2</th>
          <th>数量</th>
          <th>日時</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
</div>

<script>
const STORAGE_KEY = "logistics_barcode_v1";
const SCAN_INTERVAL = 500;

let records = [];
let scanner = null;
let scanLocked = false;
let audioContext = null;
let currentMode = "normal";
let pairFirst = "";
let torchOn = false;
let currentTrack = null;

const statusEl = document.getElementById("status");
const guideEl = document.getElementById("guide");
const latestEl = document.getElementById("latest");
const countEl = document.getElementById("count");
const historyEl = document.getElementById("history");
const pendingEl = document.getElementById("pairPending");
const zoomSlider = document.getElementById("zoomSlider");
const zoomValue = document.getElementById("zoomValue");

function pad(n){return String(n).padStart(2,"0")}
function formatDate(d){
  return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate())+" "+
    pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
}
function esc(v){
  return String(v)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function load(){
  try{
    const x=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
    records=Array.isArray(x)?x:[];
  }catch{records=[]}
}
function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
}
function render(){
  countEl.textContent=records.length;
  latestEl.textContent=records.length
    ? (records.at(-1).code2
        ? records.at(-1).code1+" / "+records.at(-1).code2
        : records.at(-1).code1)
    : "未読取";

  historyEl.innerHTML="";
  records.slice().reverse().slice(0,40).forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=
      "<td>"+esc(r.code1)+"</td>"+
      "<td>"+esc(r.code2||"")+"</td>"+
      "<td>1</td>"+
      "<td>"+esc(r.time)+"</td>";
    historyEl.appendChild(tr);
  });
}
function prepareAudio(){
  try{
    if(!audioContext){
      const C=window.AudioContext||window.webkitAudioContext;
      if(!C)return;
      audioContext=new C();
    }
    if(audioContext.state==="suspended")audioContext.resume();
  }catch{}
}
function beep(freq=1600,duration=.13){
  try{
    prepareAudio();
    if(!audioContext)return;
    const o=audioContext.createOscillator();
    const g=audioContext.createGain();
    o.type="square";
    o.frequency.setValueAtTime(freq,audioContext.currentTime);
    g.gain.setValueAtTime(.0001,audioContext.currentTime);
    g.gain.exponentialRampToValueAtTime(.28,audioContext.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.0001,audioContext.currentTime+duration);
    o.connect(g);g.connect(audioContext.destination);
    o.start();o.stop(audioContext.currentTime+duration+.01);
  }catch{}
}
function flash(){
  document.body.classList.add("scan-ok");
  setTimeout(()=>document.body.classList.remove("scan-ok"),220);
}
function registerSingle(code){
  records.push({code1:code,code2:"",qty:1,time:formatDate(new Date())});
  save();render();beep();flash();
}
function onScanSuccess(code){
  if(scanLocked)return;
  scanLocked=true;

  if(currentMode==="pair"){
    if(!pairFirst){
      pairFirst=code;
      pendingEl.textContent="上段取得済み："+code+"　次に下段を読んでください";
      beep(1200,.10);
      flash();
    }else{
      records.push({
        code1:pairFirst,
        code2:code,
        qty:1,
        time:formatDate(new Date())
      });
      pairFirst="";
      pendingEl.textContent="";
      save();render();beep();flash();
    }
  }else{
    registerSingle(code);
  }

  if(navigator.vibrate)navigator.vibrate(90);
  setTimeout(()=>scanLocked=false,SCAN_INTERVAL);
}
function qrBoxForMode(w,h){
  if(currentMode==="wide" || currentMode==="normal"){
    return {
      width:Math.floor(Math.min(w*.95,520)),
      height:Math.floor(Math.min(h*.32,150))
    };
  }
  if(currentMode==="upper"){
    return {
      width:Math.floor(Math.min(w*.95,520)),
      height:Math.floor(Math.min(h*.24,110))
    };
  }
  return {
    width:Math.floor(Math.min(w*.95,520)),
    height:Math.floor(Math.min(h*.28,130))
  };
}
async function startCamera(){
  if(scanner)return;

  prepareAudio();
  statusEl.textContent="カメラを開始しています";

  const scanConfig={
    fps:10,
    aspectRatio:1.7778,
    disableFlip:false
  };

  async function startWith(cameraConfig){
    scanner=new Html5Qrcode("reader",{verbose:false});

    await scanner.start(
      cameraConfig,
      scanConfig,
      onScanSuccess,
      ()=>{}
    );
  }

  try{
    // まず最も互換性の高い背面カメラ指定で開始
    await startWith({facingMode:"environment"});
  }catch(firstError){
    console.error("第1起動失敗",firstError);

    try{
      // 失敗時はカメラ一覧を取得し、背面と思われるカメラを直接指定
      try{
        if(scanner){
          await scanner.clear();
        }
      }catch(e){}

      scanner=null;

      const cameras=await Html5Qrcode.getCameras();

      if(!cameras || cameras.length===0){
        throw new Error("利用できるカメラが見つかりません");
      }

      let selected=cameras[0];

      const rearWords=["back","rear","environment","背面","外側"];
      const rearCamera=cameras.find(camera=>{
        const label=(camera.label||"").toLowerCase();
        return rearWords.some(word=>label.includes(word));
      });

      if(rearCamera){
        selected=rearCamera;
      }else if(cameras.length>1){
        selected=cameras[cameras.length-1];
      }

      await startWith(selected.id);

    }catch(secondError){
      console.error("第2起動失敗",secondError);

      try{
        if(scanner){
          await scanner.clear();
        }
      }catch(e){}

      scanner=null;
      statusEl.textContent="開始できませんでした";

      const detail=
        secondError && secondError.message
          ? secondError.message
          : String(secondError||firstError);

      alert(
        "カメラを開始できませんでした。\n\n"+
        "エラー内容：\n"+detail+"\n\n"+
        "SafariでURLを直接開き、カメラを許可してから再度お試しください。"
      );

      return;
    }
  }

  statusEl.textContent="読取中";

  // 起動後に対応している機種だけズーム・連続フォーカスを適用
  try{
    const video=document.querySelector("#reader video");

    if(video && video.srcObject){
      currentTrack=video.srcObject.getVideoTracks()[0];

      const caps=currentTrack.getCapabilities
        ? currentTrack.getCapabilities()
        : {};

      if(caps.focusMode && caps.focusMode.includes("continuous")){
        await currentTrack.applyConstraints({
          advanced:[{focusMode:"continuous"}]
        });
      }

      if(caps.zoom){
        zoomSlider.min=caps.zoom.min||1;
        zoomSlider.max=caps.zoom.max||3;
        zoomSlider.step=caps.zoom.step||0.1;

        const initialZoom=Math.min(
          Math.max(1.2,caps.zoom.min||1),
          caps.zoom.max||3
        );

        zoomSlider.value=initialZoom;
        zoomValue.textContent=Number(initialZoom).toFixed(1);

        await currentTrack.applyConstraints({
          advanced:[{zoom:initialZoom}]
        });
      }
    }
  }catch(e){
    console.log("ズーム・フォーカス設定は未対応",e);
  }
}
async function stopCamera(){
  if(!scanner){
    statusEl.textContent="停止中";
    return;
  }
  try{
    await scanner.stop();
    await scanner.clear();
  }catch(e){console.log(e)}
  scanner=null;
  currentTrack=null;
  torchOn=false;
  scanLocked=false;
  statusEl.textContent="停止中";
}
async function toggleTorch(){
  if(!currentTrack){
    alert("先にカメラを開始してください。");
    return;
  }
  try{
    const caps=currentTrack.getCapabilities ? currentTrack.getCapabilities() : {};
    if(!caps.torch){
      alert("このiPhone・Safariではライト操作に対応していません。");
      return;
    }
    torchOn=!torchOn;
    await currentTrack.applyConstraints({advanced:[{torch:torchOn}]});
    document.getElementById("torchBtn").textContent=torchOn?"ライト消灯":"ライト";
  }catch{
    alert("ライトを操作できませんでした。");
  }
}
zoomSlider.addEventListener("input",async()=>{
  zoomValue.textContent=Number(zoomSlider.value).toFixed(1);
  if(!currentTrack)return;
  try{
    await currentTrack.applyConstraints({
      advanced:[{zoom:Number(zoomSlider.value)}]
    });
  }catch{}
});
document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentMode=btn.dataset.mode;
    pairFirst="";
    pendingEl.textContent="";

    if(currentMode==="normal"){
      guideEl.innerHTML="佐川・西濃・JAN・ITFなど通常はこちら。<br>バーコード全体を枠内へ入れてください。";
    }else if(currentMode==="wide"){
      guideEl.innerHTML="長い送り状バーコード専用。<br>少し離して、左右の端まで全体を入れてください。";
    }else if(currentMode==="upper"){
      guideEl.innerHTML="2段ラベルの上段だけを枠へ入れてください。";
    }else{
      guideEl.innerHTML="最初に上段、その後に下段を読んでください。<br>2本を1件として保存します。";
    }

    if(scanner){
      alert("読取範囲を変更するため、一度停止してから再開してください。");
    }
  });
});
function csvEscape(v){
  return '"'+String(v).replaceAll('"','""')+'"';
}
async function shareCsv(){
  if(!records.length){
    alert("共有するデータがありません。");
    return;
  }

  const rows=[
    ["バーコード1","バーコード2","数量","読取日時"],
    ...records.map(r=>[r.code1,r.code2||"",1,r.time])
  ];

  const csv="\uFEFF"+rows.map(r=>r.map(csvEscape).join(",")).join("\r\n");
  const now=new Date();
  const name=
    "バーコード記録_"+
    now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"_"+
    pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds())+".csv";

  const file=new File([csv],name,{type:"text/csv;charset=utf-8"});

  try{
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title:"バーコード記録",
        text:"バーコード読取結果のCSVです。",
        files:[file]
      });
      return;
    }

    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=name;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);

  }catch(e){
    if(e && e.name==="AbortError")return;
    console.error(e);
    alert("共有できませんでした。");
  }
}
document.getElementById("startBtn").addEventListener("click",startCamera);
document.getElementById("stopBtn").addEventListener("click",stopCamera);
document.getElementById("torchBtn").addEventListener("click",toggleTorch);
document.getElementById("shareBtn").addEventListener("click",shareCsv);
document.getElementById("clearBtn").addEventListener("click",()=>{
  if(!confirm("保存中の全データを削除しますか？"))return;
  records=[];pairFirst="";pendingEl.textContent="";save();render();
});

load();
render();
</script>
</body>
</html>
