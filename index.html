<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>バーコード収集</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:16px;background:#f5f5f5;color:#222;transition:background-color .18s}
    body.scan-ok{background:#b9f6ca}.wrap{max-width:620px;margin:0 auto}h1{text-align:center;font-size:26px}
    .card{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    #reader{width:100%}button{width:100%;border:0;border-radius:12px;padding:16px;margin-top:10px;font-size:20px;font-weight:700;background:#1769e0;color:#fff}
    button.secondary{background:#555}button.danger{background:#c62828}#latest{font-size:24px;font-weight:700;word-break:break-all;min-height:34px}
    .count,#status{text-align:center;font-size:20px;font-weight:700;margin-top:10px}table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border-bottom:1px solid #ddd;padding:8px 4px;text-align:left}.note{font-size:13px;color:#666;line-height:1.6}
  </style>
</head>
<body>
<div class="wrap">
  <h1>バーコード収集</h1>
  <div class="card">
    <div id="reader"></div>
    <div id="status">停止中</div>
    <button id="startBtn">カメラを開始</button>
    <button id="stopBtn" class="secondary">カメラを停止</button>
  </div>
  <div class="card">
    <div>直近のバーコード</div>
    <div id="latest">未読取</div>
    <div class="count">読取件数：<span id="count">0</span>件</div>
  </div>
  <div class="card">
    <button id="csvBtn">終了してCSV保存</button>
    <button id="clearBtn" class="danger">全データを削除</button>
    <p class="note">JAN-13、JAN-8、Code128、Code39、ITF、QRコードに対応。重複制限はありません。読取成功時に音が鳴り、画面が一瞬緑になります。</p>
  </div>
  <div class="card"><table><thead><tr><th>バーコード</th><th>数量</th><th>時間</th></tr></thead><tbody id="history"></tbody></table></div>
</div>
<script>
const STORAGE_KEY='barcode_records_v2';
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let scanner=null,audioContext=null;
const latestEl=document.getElementById('latest'),countEl=document.getElementById('count'),historyEl=document.getElementById('history'),statusEl=document.getElementById('status');
function pad(n){return String(n).padStart(2,'0')}
function formatDate(d){return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())}
function saveRecords(){localStorage.setItem(STORAGE_KEY,JSON.stringify(records))}
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function render(){countEl.textContent=records.length;latestEl.textContent=records.length?records[records.length-1].barcode:'未読取';historyEl.innerHTML='';records.slice().reverse().slice(0,30).forEach(r=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+esc(r.barcode)+'</td><td>1</td><td>'+esc(r.time)+'</td>';historyEl.appendChild(tr)})}
function prepareAudio(){try{if(!audioContext)audioContext=new(window.AudioContext||window.webkitAudioContext)();if(audioContext.state==='suspended')audioContext.resume()}catch(e){console.log(e)}}
function playBeep(){try{prepareAudio();const o=audioContext.createOscillator(),g=audioContext.createGain();o.type='square';o.frequency.setValueAtTime(1650,audioContext.currentTime);g.gain.setValueAtTime(.0001,audioContext.currentTime);g.gain.exponentialRampToValueAtTime(.28,audioContext.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,audioContext.currentTime+.11);o.connect(g);g.connect(audioContext.destination);o.start();o.stop(audioContext.currentTime+.12)}catch(e){console.log(e)}}
let scanLock = false;

function onScanSuccess(decodedText) {

    if (scanLock) return;

    scanLock = true;

    const row = {
        barcode: decodedText,
        qty: 1,
        time: formatDate(new Date())
    };

    records.push(row);
    saveRecords();
    render();

    playBeep();
    flashSuccess();

    if (navigator.vibrate) {
        navigator.vibrate(120);
    }

    // 0.5秒後に次の読取を許可
    setTimeout(() => {
        scanLock = false;
    }, 500);
}
async function startCamera(){try{if(scanner)return;prepareAudio();scanner=new Html5Qrcode('reader');await scanner.start({facingMode:'environment'},{fps:12,qrbox:{width:300,height:160},aspectRatio:1.7778,formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE]},onScanSuccess,()=>{});statusEl.textContent='読取中'}catch(e){scanner=null;statusEl.textContent='開始できませんでした';alert('カメラを開始できませんでした。Safariのカメラ許可とHTTPS接続を確認してください。')}}
async function stopCamera(){if(!scanner){statusEl.textContent='停止中';return}try{await scanner.stop();await scanner.clear()}catch(e){console.log(e)}scanner=null;statusEl.textContent='停止中'}
function csvEscape(v){return '"'+String(v).replaceAll('"','""')+'"'}
function downloadCsv(){if(records.length===0){alert('保存するデータがありません。');return}const lines=[['バーコード','数量','読取日時'],...records.map(r=>[r.barcode,1,r.time])];const csv='\uFEFF'+lines.map(row=>row.map(csvEscape).join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),url=URL.createObjectURL(blob),a=document.createElement('a'),now=new Date();a.href=url;a.download='バーコード記録_'+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds())+'.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
document.getElementById('startBtn').addEventListener('click',startCamera);document.getElementById('stopBtn').addEventListener('click',stopCamera);document.getElementById('csvBtn').addEventListener('click',downloadCsv);document.getElementById('clearBtn').addEventListener('click',()=>{if(confirm('保存中の全データを削除しますか？')){records=[];saveRecords();render()}});render();
</script>
</body>
</html>
